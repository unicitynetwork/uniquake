<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background-color: #1e1e1e;
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 40px);
      max-width: 1900px;
      margin: 0 auto;
    }
    
    .header {
      margin-bottom: 20px;
    }
    
    .header h1 {
      margin: 0;
      color: #4fc3f7;
    }
    
    .main-content {
      flex: 1;
    }
    
    .panel {
      background-color: #2d2d2d;
      border-radius: 5px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
    
    .server-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    
    
    .status-display {
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    
    .log {
      flex: 1;
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }
    
    .client-list {
      flex: 1;
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
      margin-bottom: 10px;
    }
    
    .client-item {
      background-color: #3d3d3d;
      border-radius: 3px;
      padding: 10px;
      margin-bottom: 10px;
    }
    
    .client-item .client-name {
      font-weight: bold;
      color: #4fc3f7;
    }
    
    .client-item .client-info {
      font-size: 12px;
      color: #aaa;
    }
    
    .game-state {
      flex: 1;
      overflow-y: auto;
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      font-size: 14px;
    }
    
    .token-info {
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      margin-bottom: 10px;
    }
    
    input, button {
      background-color: #3d3d3d;
      border: none;
      border-radius: 3px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
    }
    
    input {
      flex: 1;
      margin-bottom: 10px;
    }
    
    button {
      background-color: #2196f3;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #1976d2;
    }
    
    button:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    
    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }
    
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
    }
    
    .status-registered {
      background-color: #4caf50;
    }
    
    .status-unregistered {
      background-color: #f44336;
    }
    
    .status-running {
      color: #4caf50;
      font-weight: bold;
    }
    
    .status-starting {
      color: #ffaa00;
      font-weight: bold;
    }
    
    .status-not-running {
      color: #888888;
      font-weight: bold;
    }
    
    /* ANSI color simulation */
    .ansi-green {
      color: #4caf50;
    }
    
    .ansi-red {
      color: #f44336;
    }
    
    .ansi-yellow {
      color: #ffeb3b;
    }
    
    .ansi-blue {
      color: #2196f3;
    }
    
    .ansi-cyan {
      color: #00bcd4;
    }
    
    .ansi-magenta {
      color: #e91e63;
    }
    
    .ansi-white {
      color: #ffffff;
    }
    
    .ansi-gray {
      color: #9e9e9e;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }
    
    .actions-panel {
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      margin-top: 10px;
    }
    
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .action-buttons button {
      flex: 1;
      min-width: 120px;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Server</h1>
    </div>
    
    <div class="serving-message" id="serving-message" style="background-color: #2a2a2a; border: 2px solid #4fc3f7; border-radius: 5px; padding: 15px; margin-bottom: 20px; text-align: center;">
      <div style="font-size: 24px; font-weight: bold; color: #4fc3f7; margin-bottom: 10px;">
        Serving server name: <span id="server-name-display">Loading...</span>
      </div>
      <div style="font-size: 16px; color: #e0e0e0;">
        You and your friends can pick it from the list of servers and click connect. Close this window to finish the game.
      </div>
    </div>
    
    <div class="main-content">
      <div class="server-panel panel">
        <div class="status-row">
          <div>
            <span class="status-indicator" id="server-status"></span>
            <span id="status-text">Not Registered</span>
          </div>
        </div>
        
        
        
        
        <div class="game-state" id="game-state">No game state available</div>
      </div>
      
    </div>
  </div>

  <!-- Load scripts -->
  <script src="lib/client/uniquake-token-service.js"></script>
  
  <script>
    // Load WebRTC adapter directly, bypassing the auto-connect behavior
    window.UNIQUAKE_CONFIG = {
      useWebRTC: true,
      masterServer: 'ws://localhost:27950',
      noAutoConnect: true  // Flag to prevent auto-connection
    };
    
    // Load the adapter script
    var script = document.createElement('script');
    script.src = '/webrtc-adapter.js';
    script.onload = function() {
      initializeServer();
    };
    document.head.appendChild(script);
    
    // Main server instance and state
    let serverConnection = null;
    let serverState = {
      registered: false,
      peerId: null,
      clients: new Map(),
      gameState: null,
      tokenService: null,
      // Entry fee tracking - track by pubkey to prevent double payment
      paidPlayers: new Set(), // Set of pubkeys that have paid entry fee for this game
      entryFee: 1, // Entry fee in tokens
      collectedFees: [] // Array of collected entry fee tokens
    };
    let selectedClientId = null;
    let dedicatedServerInfo = null; // Dedicated server information
    
    /**
     * Generate a random server name
     */
    function generateServerName() {
      const adjectives = ['Epic', 'Cosmic', 'Legendary', 'Mystic', 'Quantum', 'Rapid', 'Savage', 'Galactic', 'Neon', 'Shadow'];
      const nouns = ['Server', 'Arena', 'Battlefield', 'Realm', 'Nexus', 'Dimension', 'Domain', 'Fortress', 'Outpost', 'Hub'];
      
      const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
      const noun = nouns[Math.floor(Math.random() * nouns.length)];
      const num = Math.floor(Math.random() * 1000);
      
      return `${adj}${noun}${num}`;
    }
    
    // Initialize server
    async function initializeServer() {
      // Get initial configuration
      const config = getServerConfig();
      
      // Generate random server name
      const serverName = generateServerName();
      config.serverName = serverName;
      
      // Update the serving message with the server name
      const serverNameDisplay = document.getElementById('server-name-display');
      if (serverNameDisplay) {
        serverNameDisplay.textContent = serverName;
      }
      
      // Connect to master server for dedicated server management
      const connected = await connectToMasterServer(config);
      if (connected) {
        // Start a dedicated server
        const gameId = await startRemoteServer();
        if (gameId) {
          console.log(`Dedicated server started with game ID: ${gameId}`);
        }
      }
      
      // Set up UI event handlers
      setupUIHandlers();
      
      // Set up real-time UI updates for server stats
      setInterval(() => {
        updateGameStateDisplay();
      }, 1000); // Update every 1 second for real-time updates
      
      // Set up periodic server status updates
      setInterval(() => {
        if (serverConnection && serverConnection.readyState === WebSocket.OPEN) {
          requestServerStatus();
        }
      }, 5000); // Update every 5 seconds
    }
    
    // Connect to master server for dedicated server management
    async function connectToMasterServer(config) {
      return new Promise((resolve, reject) => {
        const masterUrl = window.UNIQUAKE_CONFIG.masterServer || 'ws://localhost:27950';
        console.log(`Connecting to master server at ${masterUrl}...`);
        
        try {
          serverConnection = new WebSocket(masterUrl);
          
          serverConnection.onopen = () => {
            console.log('Connected to master server');
            
            // Register as a server
            const registerMsg = {
              type: 'register_server',
              serverInfo: {
                name: config.serverName,
                map: config.map,
                game: 'baseq3',
                players: 0,
                maxPlayers: config.maxPlayers,
                tokenEnabled: config.tokenEnabled,
                address: 'ws-proxy' // Indicate this uses WebSocket proxy
              }
            };
            
            serverConnection.send(JSON.stringify(registerMsg));
            resolve(true);
          };
          
          serverConnection.onmessage = (event) => {
            try {
              const message = JSON.parse(event.data);
              handleMasterServerMessage(message);
            } catch (err) {
              console.error('Failed to parse message:', err.message);
            }
          };
          
          serverConnection.onclose = () => {
            console.log('Disconnected from master server');
            serverState.registered = false;
          };
          
          serverConnection.onerror = (err) => {
            console.error('Master server connection error:', err);
            reject(err);
          };
        } catch (err) {
          console.error('Failed to connect to master server:', err);
          reject(err);
        }
      });
    }
    
    // Initialize Quake game in iframe
    function initQuakeGame() {
      // ORIGINAL IMPLEMENTATION: In-browser dedicated server
      // This code launches a Quake dedicated server directly in the browser
      // by loading it in an iframe with specific command line parameters.
      // We're preserving this for future use when we return to in-browser implementation.
      const map = 'q3dm1'; // Default map
      
      // Build Quake server URL with parameters (using relative path)
      // +set sv_pure 0: Allows custom mods
      // +exec server.cfg: Executes server config
      // +map <mapname>: Loads the map directly
      // +dedicated 1: Runs in dedicated server mode
      const quakeServerUrl = `/quake?cmdline=+set%20sv_pure%200%20+exec%20server.cfg%20+map%20${map}%20+dedicated%201`;
      
      // INTERIM SOLUTION: We're using remote server instead of in-browser
      // Comment out the direct iframe load and use remote server functionality
      // iframe.src = quakeServerUrl;
      
      // Start remote dedicated server and show placeholder in iframe
      startRemoteServer().then(gameId => {
        if (gameId) {
          initGamePlaceholder();
        }
      });
      
      
    }
    
    // Start a remote dedicated server on the master server
    async function startRemoteServer() {
      const config = getServerConfig();
      const gameId = 'game-' + Date.now();
      
      
      
      try {
        // Request the master server to start a dedicated server
        const startServerMsg = {
          unicity: true,
          type: 'start_game_server',
          serverInfo: {
            name: config.serverName,
            gameId: gameId,
            map: config.map,
            maxPlayers: config.maxPlayers,
            private: false
          }
        };
        
        // Store game ID in server state for later use
        serverState.gameId = gameId;
        
        // Send the request via WebSocket
        if (serverConnection && serverConnection.readyState === WebSocket.OPEN) {
          serverConnection.send(JSON.stringify(startServerMsg));
          
          
          
          
          return gameId;
        } else {
          throw new Error('Not connected to master server');
        }
      } catch (error) {
        
        alert('Failed to start remote dedicated server: ' + error.message);
        return null;
      }
    }
    
    // Game placeholder removed (no iframe)
    function initGamePlaceholder() {
      
    }
    
    // Get server configuration (using defaults since UI inputs are removed)
    function getServerConfig() {
      return {
        serverName: undefined, // Will be auto-generated
        map: 'q3dm1',
        maxPlayers: 16,
        tokenEnabled: true
      };
    }
    
    // Set up UI event handlers
    function setupUIHandlers() {
      // Helper function to safely add event listeners
      function addSafeEventListener(elementId, eventType, handler) {
        const element = document.getElementById(elementId);
        if (element) {
          element.addEventListener(eventType, handler);
        } else {
          
        }
      }
      
      // Tab switching - Check if tabs exist first
      const tabs = document.querySelectorAll('.tab');
      if (tabs.length > 0) {
        tabs.forEach(tab => {
          tab.addEventListener('click', function() {
            // Remove active class from all tabs and tab contents
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            // Add active class to clicked tab and corresponding content
            this.classList.add('active');
            const tabContent = document.getElementById(this.getAttribute('data-tab') + '-tab');
            if (tabContent) {
              tabContent.classList.add('active');
            }
          });
        });
      }
      
      // Server control buttons removed
      
      // Server action buttons removed
      
      // Action buttons removed - no UI controls needed
      
      // Game iframe removed
    }
    
    // Legacy start server function - now handled by real server
    async function startServer() {
      // Real server handles registration and startup automatically
      return true;
    }
    
    // Legacy register function - now handled by real server
    async function registerWithMaster() {
      // Real server handles registration automatically
      return true;
    }
    
    // Stop the dedicated server
    async function stopServer() {
      // Stop game state token broadcasts
      if (serverState.gameStateInterval) {
        clearInterval(serverState.gameStateInterval);
        serverState.gameStateInterval = null;
        console.log('Stopped game state token broadcasts');
      }
      
      if (dedicatedServerInfo && serverConnection && serverConnection.readyState === WebSocket.OPEN) {
        const stopMsg = {
          unicity: true,
          type: 'stop_game_server',
          gameId: dedicatedServerInfo.gameId
        };
        serverConnection.send(JSON.stringify(stopMsg));
      }
      return true;
    }
    
    // Legacy unregister function - now handled by real server
    async function unregisterFromMaster() {
      // Real server handles unregistration automatically
      return true;
    }
    
    // Legacy remote server function - now handled by real server
    async function stopRemoteServer() {
      // Real server handles dedicated server management
      return true;
    }
    
    // Server action functions removed
    
    // Kick the selected client
    function kickSelectedClient() {
      if (!selectedClientId) {
        alert('No client selected');
        return;
      }
      
      const client = serverState.clients.get(selectedClientId);
      if (!client) {
        alert('Client not found');
        return;
      }
      
      const reason = prompt('Enter kick reason:');
      kickClient(selectedClientId, reason || 'Kicked by server');
    }
    
    // Send a message to the selected client
    function sendClientMessage() {
      if (!selectedClientId) {
        alert('No client selected');
        return;
      }
      
      const client = serverState.clients.get(selectedClientId);
      if (!client) {
        alert('Client not found');
        return;
      }
      
      const message = prompt('Enter message:');
      if (message) {
        sendMessageToClient(selectedClientId, {
          type: 'chat',
          from: 'SERVER',
          message: message
        });
      }
    }
    
    // Show token information
    function showTokens() {
      updateTokenInfo();
    }
    
    // Award tokens to a client
    function awardTokens() {
      if (!selectedClientId) {
        alert('No client selected');
        return;
      }
      
      const client = serverState.clients.get(selectedClientId);
      if (!client) {
        alert('Client not found');
        return;
      }
      
      // Award tokens to this client
      endGameWithWinner(selectedClientId);
    }
    
    // Send message to client via WebSocket proxy
    function sendMessageToClient(clientId, message) {
      if (serverConnection && serverConnection.readyState === WebSocket.OPEN) {
        const proxyMessage = {
          type: 'proxy_data',
          clientId: clientId,
          data: message
        };
        serverConnection.send(JSON.stringify(proxyMessage));
        return true;
      }
      return false;
    }
    
    // Kick a client
    function kickClient(clientId, reason) {
      if (serverConnection && serverConnection.readyState === WebSocket.OPEN) {
        const kickMessage = {
          type: 'kick_client',
          clientId: clientId,
          reason: reason || 'Kicked by server'
        };
        serverConnection.send(JSON.stringify(kickMessage));
      }
      
      // Remove from our client list
      serverState.clients.delete(clientId);
      updateClientList();
    }
    
    // End game with winner
    async function endGameWithWinner(winnerId) {
      const winner = serverState.clients.get(winnerId);
      if (!winner) {
        console.error(`Winner ${winnerId} not found in client list`);
        return;
      }
      
      if (!winner.pubkey) {
        console.error(`Winner ${winnerId} does not have a pubkey - cannot distribute tokens`);
        return;
      }
      
      // Distribute collected entry fees to winner
      if (serverState.collectedFees.length > 0 && serverState.tokenService) {
        try {
          console.log(`Distributing ${serverState.collectedFees.length} collected entry fees to winner ${winner.username || winnerId}`);
          
          // Send all collected fees to the winner
          const tokenFlows = await serverState.tokenService.sendTokensToRecipient(
            serverState.collectedFees,
            winner.pubkey
          );
          
          // Send the winnings to the winner
          sendMessageToClient(winnerId, {
            type: 'token:reward',
            tokenFlows: tokenFlows,
            count: tokenFlows.length,
            message: `Congratulations! You won ${tokenFlows.length} tokens from entry fees!`
          });
          
          // Broadcast winner announcement
          broadcastToAllClients({
            type: 'chat',
            from: 'SERVER',
            message: `🏆 ${winner.username || winnerId} wins the game and receives ${tokenFlows.length} tokens!`,
            timestamp: Date.now()
          });
          
          // Clear collected fees
          serverState.collectedFees = [];
          
          console.log(`Successfully distributed ${tokenFlows.length} tokens to winner ${winner.pubkey.substring(0, 10)}...`);
          
        } catch (error) {
          console.error(`Failed to distribute tokens to winner ${winnerId}:`, error);
          
          // Notify winner about the error
          sendMessageToClient(winnerId, {
            type: 'error',
            message: `Error distributing winnings: ${error.message}`
          });
        }
      } else {
        console.log('No entry fees collected or token service unavailable - no tokens to distribute');
        
        // Still announce the winner
        broadcastToAllClients({
          type: 'chat',
          from: 'SERVER',
          message: `🏆 ${winner.username || winnerId} wins the game!`,
          timestamp: Date.now()
        });
      }
      
      // Send end game command to dedicated server
      if (dedicatedServerInfo && serverConnection && serverConnection.readyState === WebSocket.OPEN) {
        const endGameMsg = {
          type: 'end_game',
          gameId: dedicatedServerInfo.gameId,
          winnerId: winnerId
        };
        serverConnection.send(JSON.stringify(endGameMsg));
      }
    }
    
    // Reset game for new round (clear paid players but keep collected fees until next winner)
    function resetGameRound() {
      console.log('Resetting game round - clearing paid players list');
      
      // Clear the list of players who have paid entry fees
      // This allows the same players to pay again for a new game round
      serverState.paidPlayers.clear();
      
      // Reset all client entry token status
      serverState.clients.forEach(client => {
        client.entryTokenReceived = false;
      });
      
      // Broadcast reset announcement
      broadcastToAllClients({
        type: 'chat',
        from: 'SERVER',
        message: `🔄 New game round started! Entry fees reset - all players must pay again.`,
        timestamp: Date.now()
      });
      
      console.log('Game round reset complete - players must pay entry fees again');
      updateGameStateDisplay();
    }
    
    // Server status display removed
    
    // Handle server registration confirmation
    function handleServerRegistration(message) {
      console.log('Server registered with peer ID:', message.peerId);
      serverState.peerId = message.peerId;
      serverState.registered = true;
      updateServerStatus('starting');
      
      // Initialize token service for the server
      initializeTokenService();
    }
    
    // Initialize token service for server
    async function initializeTokenService() {
      if (!window.UniQuakeTokenService) {
        console.log('UniQuakeTokenService not available');
        return;
      }
      
      try {
        console.log('Initializing server token service...');
        
        // Get server config to use server name
        const config = getServerConfig();
        const serverName = config.serverName || 'Server';
        
        // Create token service with server name as username
        serverState.tokenService = new window.UniQuakeTokenService({
          username: serverName,
          debug: false
        });
        
        // Initialize the service
        await serverState.tokenService.init();
        
        // Get identity info
        const identity = serverState.tokenService.getIdentity();
        console.log(`Server token service initialized with identity: ${identity.username} (${identity.pubkey.substring(0, 10)}...)`);
        
        // Start the game state token system
        startGameStateTokens();
        
      } catch (error) {
        console.error('Failed to initialize server token service:', error);
      }
    }
    
    // Start periodic game state token broadcasts
    function startGameStateTokens() {
      if (!serverState.tokenService) {
        console.log('Cannot start game state tokens: token service not available');
        return;
      }
      
      console.log('Starting game state token broadcasts...');
      
      // Initialize game state
      serverState.gameState = {
        gameId: dedicatedServerInfo?.gameId || `game-${Date.now()}`,
        frame: 0,
        timestamp: Date.now(),
        players: {},
        items: {}
      };
      
      // Create initial token
      setTimeout(() => {
        createGameStateToken(true);
      }, 1000);
      
      // Set up periodic token broadcasts (every 10 seconds)
      serverState.gameStateInterval = setInterval(() => {
        createGameStateToken(true);
      }, 10000);
    }
    
    // Create and broadcast game state token
    async function createGameStateToken(broadcast = true) {
      if (!serverState.tokenService) {
        return null;
      }
      
      try {
        // Update game state with current server info
        serverState.gameState.frame++;
        serverState.gameState.timestamp = Date.now();
        
        // Update players from connected clients
        serverState.gameState.players = {};
        serverState.clients.forEach((client, clientId) => {
          const playerKey = client.pubkey || clientId;
          serverState.gameState.players[playerKey] = {
            id: playerKey,
            name: client.username || `Player-${clientId}`,
            connected: client.connected,
            pubkey: client.pubkey,
            clientId: clientId,
            joinTime: client.joinTime,
            lastActive: Date.now()
          };
        });
        
        console.log(`Creating game state token for frame ${serverState.gameState.frame} with ${Object.keys(serverState.gameState.players).length} players`);
        
        // Create or update the token
        // Reset token every 10 frames to prevent growth (when frame is divisible by 10)
        let token = null;
        const shouldResetToken = serverState.gameState.frame % 10 === 0;
        
        if (!serverState.tokenService.lastStateToken || shouldResetToken) {
          if (shouldResetToken) {
            console.log(`Resetting game state token at frame ${serverState.gameState.frame} (divisible by 10)`);
          }
          // Create fresh token (initial or reset)
          token = await serverState.tokenService.createGameStateToken(serverState.gameState);
          console.log(`Created ${shouldResetToken ? 'reset' : 'initial'} game state token for frame ${serverState.gameState.frame}`);
        } else {
          // Update existing token
          try {
            token = await serverState.tokenService.updateGameStateToken(
              serverState.tokenService.lastStateToken,
              serverState.gameState
            );
            console.log(`Updated game state token for frame ${serverState.gameState.frame}`);
          } catch (updateError) {
            // If update fails, create new token
            console.warn(`Token update failed, creating new token: ${updateError.message}`);
            token = await serverState.tokenService.createGameStateToken(serverState.gameState);
          }
        }
        
        // Broadcast to all connected clients if requested
        if (broadcast && token) {
          const tokenFlow = serverState.tokenService.TXF.exportFlow(token);
          
          const serverStateInfo = {
            playerCount: serverState.clients.size,
            itemCount: Object.keys(serverState.gameState.items).length,
            timestamp: Date.now()
          };
          
          const message = {
            type: 'game:state:token',
            tokenFlow: tokenFlow,
            frame: serverState.gameState.frame,
            serverInfo: serverStateInfo
          };
          
          console.log(`Broadcasting game state token for frame ${serverState.gameState.frame} to ${serverState.clients.size} clients`);
          broadcastToAllClients(message);
          
          // Also send server state update
          broadcastToAllClients({
            type: 'server:state:update',
            serverInfo: serverStateInfo
          });
        }
        
        return token;
      } catch (error) {
        console.error('Failed to create game state token:', error);
        return null;
      }
    }
    
    // Handle dedicated server started
    function handleGameServerStarted(message) {
      console.log('Dedicated server started:', message);
      dedicatedServerInfo = {
        gameId: message.gameId,
        serverId: message.serverId,
        serverInfo: message.serverInfo
      };
      updateServerStatus('running');
    }
    
    // Handle dedicated server stopped  
    function handleGameServerStopped(message) {
      console.log('Dedicated server stopped:', message);
      dedicatedServerInfo = null;
      updateServerStatus('not_running');
    }
    
    // Handle client connection (from real game server via master server)
    function handleClientConnect(clientData) {
      
      
      // Add to our client registry
      serverState.clients.set(clientData.id, {
        id: clientData.id,
        username: clientData.username || clientData.id,
        pubkey: clientData.pubkey || null,
        connected: true,
        joinTime: Date.now()
      });
      
      // Enable client action buttons if at least one client is connected
      const kickButton = document.getElementById('kick-button');
      const messageButton = document.getElementById('message-button');  
      const awardButton = document.getElementById('award-tokens-button');
      
      if (kickButton) kickButton.disabled = false;
      if (messageButton) messageButton.disabled = false;
      if (awardButton) awardButton.disabled = false;
      
      // Update client list
      updateClientList();
    }
    
    // Handle client disconnection
    function handleClientDisconnect(clientData) {
      
      
      // Clear selection if this client was selected
      if (selectedClientId === clientData.id || 
          (clientData.pubkey && selectedClientId === clientData.pubkey)) {
        selectedClientId = null;
      }
      
      // Remove from our client registry
      serverState.clients.delete(clientData.id);
      
      // Update client list
      updateClientList();
      
      // Disable client action buttons if no clients are connected
      if (serverState.clients.size === 0) {
        const kickButton = document.getElementById('kick-button');
        const messageButton = document.getElementById('message-button');  
        const awardButton = document.getElementById('award-tokens-button');
        
        if (kickButton) kickButton.disabled = true;
        if (messageButton) messageButton.disabled = true;
        if (awardButton) awardButton.disabled = true;
      }
    }
    
    // Handle chat message
    function handleChatMessage(event) {
      
    }
    
    // Update client list display
    function updateClientList() {
      const clientList = document.getElementById('client-list');
      if (!clientList) return;
      
      const clients = Array.from(serverState.clients.values());
      
      if (clients.length === 0) {
        clientList.innerHTML = 'No clients connected';
        return;
      }
      
      clientList.innerHTML = '';
      
      clients.forEach(client => {
        const clientElem = document.createElement('div');
        clientElem.className = 'client-item';
        
        // Use pubkey as primary identifier, fallback to client.id
        const primaryId = client.pubkey || client.id;
        
        if (selectedClientId === primaryId) {
          clientElem.className += ' selected';
          clientElem.style.borderLeft = '3px solid #4fc3f7';
        }
        
        clientElem.innerHTML = `
          <div class="client-name">${client.username || (client.pubkey ? client.pubkey.substring(0, 16) + '...' : client.id)}</div>
          <div class="client-info">Player ID (Pubkey): <span style="font-family: monospace; word-break: break-all;">${client.pubkey || 'N/A'}</span></div>
          <div class="client-info">Network ID: <span style="font-family: monospace; word-break: break-all;">${client.id}</span></div>
          <div class="client-info">Entry Token: ${client.entryTokenReceived ? 'Received' : 'Not Received'}</div>
        `;
        
        clientElem.addEventListener('click', () => {
          // Update selection using pubkey as primary identifier
          selectedClientId = primaryId;
          
          // Update client list
          updateClientList();
        });
        
        clientList.appendChild(clientElem);
      });
    }
    
    // Update game state display (now called updateGameStateDisplay to avoid conflicts)
    function updateGameStateDisplay() {
      const gameStateElem = document.getElementById('game-state');
      if (!gameStateElem) return;
      
      // Get server information from dedicated server if available
      let serverName = 'Unknown';
      if (dedicatedServerInfo && dedicatedServerInfo.serverInfo && dedicatedServerInfo.serverInfo.name) {
        serverName = dedicatedServerInfo.serverInfo.name;
      } else {
        const config = getServerConfig();
        serverName = config.serverName || 'Unknown';
      }
      const serverId = serverState.peerId || 'Not registered';
      
      // Calculate real-time balance from token service
      let balance = 0;
      let tokenInfo = 'Token service not available';
      
      if (serverState.tokenService) {
        try {
          const tokenStatus = serverState.tokenService.getTokenStatus();
          balance = tokenStatus.value || 0;
          tokenInfo = `Token service active (${tokenStatus.tokens?.total || 0} tokens)`;
        } catch (error) {
          tokenInfo = `Token service error: ${error.message}`;
        }
      }
      
      // Get current game state from the dedicated server
      let gameState = serverState.gameState;
      const frame = gameState?.frame || 0;
      const timestamp = gameState?.timestamp || Date.now();
      const playerCount = serverState.clients.size;
      
      gameStateElem.innerHTML = `
        <strong>Server Name:</strong> ${serverName}<br>
        <strong>Server ID:</strong> <span style="font-family: monospace; word-break: break-all;">${serverId}</span><br>
        <strong>Game ID:</strong> ${dedicatedServerInfo?.gameId || serverState.gameId || 'Not started'}<br>
        <strong>Balance:</strong> ${balance} tokens<br>
        <strong>Token Status:</strong> ${tokenInfo}<br>
        <strong>Entry Fee:</strong> ${serverState.entryFee} token${serverState.entryFee !== 1 ? 's' : ''}<br>
        <strong>Collected Fees:</strong> ${serverState.collectedFees.length} tokens<br>
        <strong>Players Paid:</strong> ${serverState.paidPlayers.size} unique players<br>
        <strong>Frame:</strong> ${frame}<br>
        <strong>Timestamp:</strong> ${new Date(timestamp).toLocaleTimeString()}<br>
        <strong>Connected Players:</strong> ${playerCount}<br>
      `;
      
      // Display connected clients information
      if (serverState.clients.size > 0) {
        gameStateElem.innerHTML += '<br><strong>Connected Players:</strong><br>';
        
        Array.from(serverState.clients.values()).forEach(client => {
          const playerName = client.username || client.id;
          const connectionStatus = client.connected ? '🟢 Connected' : '🔴 Disconnected';
          const joinTime = new Date(client.joinTime).toLocaleTimeString();
          
          // Check entry fee status by pubkey
          const hasPaidEntryFee = client.pubkey && serverState.paidPlayers.has(client.pubkey);
          const entryFeeStatus = hasPaidEntryFee ? '💰 Entry Fee Paid' : '❌ Entry Fee Not Paid';
          
          gameStateElem.innerHTML += `
            - ${playerName}: ${connectionStatus} (joined ${joinTime})<br>
            &nbsp;&nbsp;${entryFeeStatus}<br>
            &nbsp;&nbsp;Player Pubkey: <span style="font-family: monospace; font-size: 12px;">${client.pubkey || 'Not Set'}</span><br>
            &nbsp;&nbsp;Network ID: <span style="font-family: monospace; font-size: 12px;">${client.id}</span><br>
          `;
        });
      }
      
      // Update token info as well
      updateTokenInfo();
    }
    
    // Update token information
    function updateTokenInfo() {
      // Token info is now displayed in the main game state panel
      // This function is kept for compatibility but doesn't need to do anything
      
    }
    
    // Handle token events
    function handleTokenEvent(event) {
      
      
      // Update token info
      updateTokenInfo();
    }
    
    // Handle player join event
    function handlePlayerJoin(player) {
      
    }
    
    // Handle player leave event
    function handlePlayerLeave(player) {
      
    }
    
    // Handle game end event
    function handleGameEnd(result) {
      
      
      // Update token info
      updateTokenInfo();
      
      // Game restart logic removed (no iframe)
    }
    
    // Handle messages from the master server
    function handleMasterServerMessage(message) {
      
      
      // Process by message type
      switch (message.type) {
        case 'connected':
          
          break;
          
        case 'server_registered':
          handleServerRegistration(message);
          break;
          
        case 'connection_request':
          handleConnectionRequest(message);
          break;
          
        case 'proxy_data':
          handleProxyData(message);
          break;
          
        case 'proxy_connection':
          handleProxyConnection(message);
          break;
          
        case 'server_disconnected':
          handleClientDisconnected(message);
          break;
          
        case 'game_server_started':
          handleGameServerStarted(message);
          break;
          
        case 'game_server_stopped':
          handleGameServerStopped(message);
          break;
          
        case 'game_server_status':
          handleGameServerStatus(message);
          break;
          
        case 'game_server_logs':
          handleGameServerLogs(message);
          break;
          
        case 'server_list':
          handleServerListForStatus(message.servers || []);
          break;
          
        case 'error':
          handleMasterServerError(message);
          break;
          
        default:
          
          break;
      }
    }
    
    // Handle connection request from client
    function handleConnectionRequest(message) {
      const { connectionId, clientId, identity } = message;
      
      
      // Add client to our registry
      const clientData = {
        id: clientId,
        username: identity?.username || clientId,
        pubkey: identity?.pubkey || null,
        connected: true,
        joinTime: Date.now(),
        entryTokenReceived: false
      };
      
      serverState.clients.set(clientId, clientData);
      
      // Notify our UI
      handleClientConnect(clientData);
      
      // Send acceptance back to master server
      const acceptMessage = {
        type: 'proxy_connection',
        clientId: clientId,
        connectionId: connectionId
      };
      
      serverConnection.send(JSON.stringify(acceptMessage));
    }
    
    // Handle proxy connection from client via master server
    function handleProxyConnection(message) {
      const { clientId, serverPeerId } = message;
      
      console.log(`Client ${clientId} connected via proxy to server ${serverPeerId}`);
      
      // Add client to our registry
      const clientData = {
        id: clientId,
        username: clientId, // Will be updated when identity is received
        pubkey: null,
        connected: true,
        joinTime: Date.now(),
        entryTokenReceived: false
      };
      
      serverState.clients.set(clientId, clientData);
      updateClientList();
      
      // Send welcome message to the client
      const welcomeMessage = {
        type: 'welcome',
        message: `Welcome to the server! Entry fee: ${serverState.entryFee} token${serverState.entryFee !== 1 ? 's' : ''}`,
        serverInfo: {
          tokenEnabled: !!serverState.tokenService,
          entryFee: serverState.entryFee,
          gameId: serverState.gameState?.gameId || dedicatedServerInfo?.gameId
        },
        // Include server identity for token operations if available
        serverIdentity: serverState.tokenService ? {
          pubkey: serverState.tokenService.getIdentity().pubkey,
          username: serverState.tokenService.getIdentity().username
        } : null
      };
      
      console.log(`Sending welcome message to client ${clientId}:`, welcomeMessage);
      if (welcomeMessage.serverIdentity) {
        console.log(`✅ Server identity included in welcome message - client should send entry token automatically`);
        console.log(`Server pubkey: ${welcomeMessage.serverIdentity.pubkey.substring(0, 16)}...`);
      } else {
        console.log(`❌ No server identity in welcome message - entry tokens will not work!`);
      }
      sendMessageToClient(clientId, welcomeMessage);
    }

    // Handle proxy data from clients
    function handleProxyData(message) {
      const { clientId, data } = message;
      
      console.log(`Received data from client ${clientId}:`, data);
      
      // Log the specific message type for debugging
      if (data && data.type) {
        console.log(`Message type: ${data.type} from client ${clientId}`);
      }
      
      // Update client data based on incoming messages
      const client = serverState.clients.get(clientId);
      if (client && data) {
        // Handle different message types from clients
        switch (data.type) {
          case 'identity:update':
            if (data.identity) {
              client.pubkey = data.identity.pubkey || client.pubkey;
              client.username = data.identity.username || client.username;
              console.log(`Updated client identity: ${client.username} (${client.pubkey?.substring(0, 10)}...)`);
              updateClientList();
            }
            break;
            
          case 'token:entry':
            console.log(`🎫 ENTRY TOKEN PAYMENT received from client ${clientId}!`);
            handleEntryToken(clientId, data);
            break;
            
          case 'chat':
            console.log(`Chat from ${client.username}: ${data.message}`);
            // Broadcast chat to all clients
            broadcastToAllClients({
              type: 'chat',
              from: client.username || clientId,
              message: data.message,
              timestamp: Date.now()
            });
            break;
            
          case 'request:game:state:token':
            handleGameStateTokenRequest(clientId);
            break;
            
          default:
            console.log(`⚠️ Unhandled message type '${data.type}' from client ${clientId}:`, data);
            break;
        }
      }
    }
    
    // Handle entry token from client
    async function handleEntryToken(clientId, tokenData) {
      const client = serverState.clients.get(clientId);
      if (!client) return;
      
      if (!serverState.tokenService) {
        sendMessageToClient(clientId, {
          type: 'token:entry:ack',
          success: false,
          reason: 'Token service not available'
        });
        return;
      }
      
      // Check if client has a pubkey (required for entry fee tracking)
      if (!client.pubkey) {
        sendMessageToClient(clientId, {
          type: 'token:entry:ack',
          success: false,
          reason: 'Player identity (pubkey) required for entry fee payment'
        });
        return;
      }
      
      console.log(`Processing entry token from client ${clientId} (pubkey: ${client.pubkey.substring(0, 10)}...)`);
      
      // Check if this player (by pubkey) has already paid the entry fee for this game
      if (serverState.paidPlayers.has(client.pubkey)) {
        console.log(`Player ${client.pubkey.substring(0, 10)}... has already paid entry fee - allowing rejoin`);
        
        // Mark as received for this connection (UI purposes)
        client.entryTokenReceived = true;
        updateClientList();
        
        // Send acknowledgment for rejoin
        sendMessageToClient(clientId, {
          type: 'token:entry:ack',
          success: true,
          message: 'Welcome back! Entry fee already paid for this game',
          isRejoin: true
        });
        
        // Broadcast rejoin message
        broadcastToAllClients({
          type: 'chat',
          from: 'SERVER',
          message: `${client.username || clientId} has rejoined the game`,
          timestamp: Date.now()
        });
        
        return;
      }
      
      // New player - validate and collect entry fee
      try {
        const tokenFlow = tokenData.tokenFlow;
        const result = await validateEntryToken(clientId, tokenFlow);
        
        if (result.success) {
          // Mark this pubkey as having paid for this game
          serverState.paidPlayers.add(client.pubkey);
          
          // Store the collected token
          serverState.collectedFees.push(result.token);
          
          // Mark as received for this connection
          client.entryTokenReceived = true;
          updateClientList();
          
          console.log(`Entry fee collected from ${client.pubkey.substring(0, 10)}... - Total collected fees: ${serverState.collectedFees.length}`);
          
          // Send acknowledgment
          sendMessageToClient(clientId, {
            type: 'token:entry:ack',
            success: true,
            message: 'Entry fee paid successfully',
            isNewPayment: true
          });
          
          // Broadcast payment confirmation
          broadcastToAllClients({
            type: 'chat',
            from: 'SERVER',
            message: `${client.username || clientId} has paid the entry fee and joined the game!`,
            timestamp: Date.now()
          });
          
        } else {
          // Payment failed
          sendMessageToClient(clientId, {
            type: 'token:entry:ack',
            success: false,
            reason: result.reason || 'Invalid entry fee token'
          });
          
          console.log(`Entry fee payment failed for ${client.pubkey.substring(0, 10)}...: ${result.reason}`);
        }
      } catch (error) {
        console.error(`Error processing entry fee from ${client.pubkey.substring(0, 10)}...:`, error);
        
        sendMessageToClient(clientId, {
          type: 'token:entry:ack',
          success: false,
          reason: 'Error processing entry fee: ' + error.message
        });
      }
    }
    
    // Validate entry token from client
    async function validateEntryToken(clientId, tokenFlow) {
      if (!serverState.tokenService) {
        return { success: false, reason: 'Token service not enabled on server' };
      }
      
      try {
        console.log(`Validating entry token from client ${clientId}...`);
        
        // Receive and validate the token
        const result = await serverState.tokenService.receiveToken(tokenFlow);
        
        if (result.success) {
          console.log(`Valid entry token received from client ${clientId}`);
          return { success: true, token: result.token };
        } else {
          console.log(`Invalid entry token from client ${clientId}: ${result.error}`);
          return { success: false, reason: result.error };
        }
      } catch (error) {
        console.error(`Error processing entry token from client ${clientId}:`, error.message);
        return { success: false, reason: error.message };
      }
    }
    
    // Handle game state token request
    async function handleGameStateTokenRequest(clientId) {
      if (!serverState.tokenService) {
        console.log(`Client ${clientId} requested game state token but token service not available`);
        return;
      }
      
      console.log(`Client ${clientId} requested game state token`);
      
      try {
        // Create a fresh token if we don't have one, or use existing
        if (!serverState.tokenService.lastStateToken) {
          await createGameStateToken(false);
        }
        
        if (serverState.tokenService.lastStateToken) {
          const tokenFlow = serverState.tokenService.TXF.exportFlow(serverState.tokenService.lastStateToken);
          
          const serverStateInfo = {
            playerCount: serverState.clients.size,
            itemCount: Object.keys(serverState.gameState?.items || {}).length,
            timestamp: Date.now()
          };
          
          // Send game state token to the requesting client
          sendMessageToClient(clientId, {
            type: 'game:state:token',
            tokenFlow: tokenFlow,
            frame: serverState.gameState?.frame || 0,
            serverInfo: serverStateInfo
          });
          
          console.log(`Sent game state token to client ${clientId}`);
        } else {
          console.log(`No token available to send to client ${clientId}`);
        }
      } catch (error) {
        console.error(`Error sending game state token to client ${clientId}:`, error);
      }
    }
    
    // Broadcast message to all connected clients
    function broadcastToAllClients(message) {
      serverState.clients.forEach((client, clientId) => {
        if (client.connected) {
          sendMessageToClient(clientId, message);
        }
      });
    }
    
    // Handle client disconnection
    function handleClientDisconnected(message) {
      const clientId = message.clientId;
      if (!clientId) return;
      
      console.log(`Client ${clientId} disconnected`);
      
      // Remove from client registry
      const client = serverState.clients.get(clientId);
      if (client) {
        // Clear selection if this client was selected
        if (selectedClientId === clientId || 
            (client.pubkey && selectedClientId === client.pubkey)) {
          selectedClientId = null;
        }
        
        serverState.clients.delete(clientId);
        updateClientList();
        
        console.log(`Client ${client.username || clientId} has left the server`);
      }
    }
    
    // Handle successful game server start
    function handleGameServerStarted(message) {
      
      
      // Log status instead of displaying in UI
      
      
      // Update server state
      serverState.gameId = message.gameId;
      serverState.remoteServerInfo = message.serverInfo;
    }
    
    // Handle successful game server stop
    function handleGameServerStopped(message) {
      
      
      // Log status instead of displaying in UI
      
      
      // Clear server state
      serverState.gameId = null;
      serverState.remoteServerInfo = null;
    }
    
    // Handle game server status update
    function handleGameServerStatus(message) {
      
      
      // Log status instead of displaying in UI
      
    }
    
    // Update server status display
    function updateServerStatus(dedicatedServerState = 'not_running') {
      const statusText = document.getElementById('status-text');
      if (!statusText) return;
      
      // Remove existing status classes
      statusText.className = '';
      
      // Update text and class based on state
      switch (dedicatedServerState) {
        case 'running':
          statusText.textContent = 'Running';
          statusText.className = 'status-running';
          break;
        case 'starting':
          statusText.textContent = 'Starting';
          statusText.className = 'status-starting';
          break;
        case 'not_running':
        default:
          statusText.textContent = 'Not Running';
          statusText.className = 'status-not-running';
          break;
      }
      
      
    }
    
    // Request server list to get our own server status
    function requestServerStatus() {
      if (serverConnection && serverConnection.readyState === WebSocket.OPEN) {
        try {
          serverConnection.send(JSON.stringify({
            type: 'get_servers'
          }));
        } catch (error) {
          // Failed to request server status
        }
      }
    }
    
    // Handle server list response to update our status
    function handleServerListForStatus(servers) {
      if (!serverState.peerId) return;
      
      // Find our server in the list
      const myServer = servers.find(s => s.peerId === serverState.peerId);
      
      if (myServer) {
        const dedicatedState = myServer.dedicatedServerState || 'not_running';
        updateServerStatus(dedicatedState);
        
        // Store the state for debugging
        serverState.dedicatedServerState = dedicatedState;
        
        
      } else {
        // Server not found in list - probably not registered or removed
        updateServerStatus('not_running');
        
      }
    }
    
    // Handle game server logs
    function handleGameServerLogs(message) {
      
      
      // Could display logs in a modal or dedicated panel
    }
    
    // Handle master server errors
    function handleMasterServerError(message) {
      
      
      // Log error instead of displaying in UI
      
      
      // Alert the user
      alert(`Master server error: ${message.error}`);
    }
    
    // Format uptime in seconds to readable format
    function formatUptime(seconds) {
      if (!seconds) return 'N/A';
      
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      
      return `${hours}h ${minutes}m ${secs}s`;
    }
