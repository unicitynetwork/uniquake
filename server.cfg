// QuakeJS Server Configuration
seta sv_hostname "Local QuakeJS Server"
seta sv_maxclients 16
seta g_motd "Welcome to QuakeJS"
seta g_gametype 0       // 0 = FFA, 1 = Tournament, 2 = FFA, 3 = Team DM, 4 = CTF
seta timelimit 15
seta fraglimit 25
seta g_weaponrespawn 3
seta g_inactivity 3000
seta g_forcerespawn 0
seta rconpassword "localserver"  // Change this!

// Bot configuration (uncomment to add bots)
// seta bot_enable 1
// seta bot_minplayers 2

// Map rotation
set d1 "map q3dm7 ; set nextmap vstr d2"
set d2 "map q3dm17 ; set nextmap vstr d1"
vstr d1  // Start with q3dm7