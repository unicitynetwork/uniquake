<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background-color: #1e1e1e;
      color: #e0e0e0;
      margin: 0;
      padding: 10px; /* Reduced padding to maximize space */
      height: 100vh;
      overflow: hidden; /* Prevent body scrolling */
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 20px); /* Adjusted for reduced padding */
      width: 100%;
      margin: 0 auto;
    }
    
    .header {
      margin-bottom: 10px; /* Reduced margin to give more space to the game */
      display: flex;
      justify-content: flex-end; /* Align to the right since no title */
      align-items: center;
    }
    
    .player-info {
      font-size: 0.7rem;
      color: #e0e0e0;
      display: flex;
      gap: 15px; /* Space between the three elements */
      align-items: center;
    }
    
    .player-name {
      color: #4fc3f7;
      font-weight: bold;
    }
    
    .player-name-input {
      background-color: #3d3d3d;
      border: 1px solid #555;
      border-radius: 3px;
      padding: 4px 8px;
      color: #4fc3f7;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 0.7rem;
      width: 180px;
      transition: border-color 0.2s;
    }
    
    .player-name-input:focus {
      outline: none;
      border-color: #4fc3f7;
      box-shadow: 0 0 4px rgba(79, 195, 247, 0.3);
    }
    
    .player-name-input:disabled {
      background-color: #2a2a2a;
      border-color: #444;
      color: #888;
      cursor: not-allowed;
    }
    
    .clear-button {
      background-color: #f44336;
      border: none;
      border-radius: 3px;
      padding: 4px 8px;
      color: white;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-right: 8px;
    }
    
    .clear-button:hover {
      background-color: #d32f2f;
    }
    
    .clear-button:disabled {
      background-color: #666;
      cursor: not-allowed;
    }
    
    .player-address {
      color: #ffeb3b;
      font-family: monospace;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
      position: relative;
      font-size: 0.7rem;
    }
    
    .player-address:hover {
      color: #fff59d;
    }
    
    .copy-hint {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #333;
      color: #4caf50;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.6rem;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
    }
    
    .copy-hint.show {
      opacity: 1;
    }
    
    .player-balance {
      color: #4caf50;
      font-weight: bold;
    }
    
    .main-content {
      display: flex;
      flex: 1;
      height: calc(100vh - 70px); /* Adjusted for header and padding */
      overflow: hidden; /* Prevent scroll on the main container */
    }
    
    .panel {
      background-color: #2d2d2d;
      border-radius: 5px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
    
    .left-panel {
      width: 250px; /* Increased from 200px to 250px */
      min-width: 150px; /* Minimum width for usability */
      max-width: 600px; /* Maximum width to prevent taking over */
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-y: auto;
      max-height: 100%; /* Ensure it doesn't overflow the container */
      font-size: 0.33em; /* Reduce all text by triple fold */
    }
    
    /* Scale down all elements in left panel */
    .left-panel h2 {
      font-size: 2.4em; /* Increased by 2x: was 1.2em, now 2.4em */
    }
    
    .left-panel button {
      font-size: 2em; /* Increased by 2x: was 1em, now 2em */
      /* Padding defined in the override below */
    }
    
    .left-panel input {
      font-size: 1em; /* Keep input fields at normal size for readability */
      padding: 4px 6px; /* Smaller padding */
    }
    
    .resizer {
      width: 5px;
      background-color: #444;
      cursor: col-resize;
      flex-shrink: 0;
      transition: background-color 0.2s;
      position: relative;
    }
    
    .resizer:hover {
      background-color: #4fc3f7;
    }
    
    .resizer:active {
      background-color: #2196f3;
    }
    
    .right-panels {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 100%;
      overflow: hidden;
    }
    
    .server-list {
      height: 450px; /* Fixed height for server list */
      overflow-y: auto;
      margin-bottom: 15px;
    }
    
    .server-item {
      background-color: #3d3d3d;
      border: 2px solid #5d5d5d;
      border-radius: 3px;
      padding: 2px 4px; /* Smaller padding like other buttons */
      margin-bottom: 4px; /* Reduced margin for tighter spacing */
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s;
    }
    
    .server-item:hover {
      background-color: #4d4d4d;
    }
    
    .server-item.selected {
      background-color: rgba(33, 150, 243, 0.3);
      border-color: #2196f3 !important;
      box-shadow: 0 0 8px rgba(33, 150, 243, 0.5);
    }
    
    .server-item.malformed {
      background-color: rgba(255, 68, 68, 0.15);
      border: 2px solid #ff4444;
      color: #ffffff;
    }
    
    .server-item.malformed:hover {
      background-color: rgba(255, 68, 68, 0.25);
    }
    
    .server-item.not-running {
      background-color: rgba(102, 102, 102, 0.15);
      border: 2px solid #666666;
      color: #cccccc;
    }
    
    .server-item.not-running:hover {
      background-color: rgba(102, 102, 102, 0.25);
    }
    
    .server-item.starting {
      background-color: rgba(255, 170, 0, 0.15);
      border: 2px solid #ffaa00;
      color: #ffffff;
    }
    
    .server-item.starting:hover {
      background-color: rgba(255, 170, 0, 0.25);
    }
    
    .server-item.running {
      background-color: rgba(76, 175, 80, 0.15);
      border: 2px solid #4caf50;
      color: #ffffff;
    }
    
    .server-item.running:hover {
      background-color: rgba(76, 175, 80, 0.25);
    }
    
    .server-item.game-over {
      background-color: rgba(255, 152, 0, 0.15);
      border: 2px solid #ff9800;
      color: #ffffff;
    }
    
    .server-item.game-over:hover {
      background-color: rgba(255, 152, 0, 0.25);
    }
    
    .server-status {
      font-size: 0.8rem;
      font-weight: bold;
      margin-top: 2px;
    }
    
    .server-status.running {
      color: #4caf50;
    }
    
    .server-status.starting {
      color: #ffaa00;
    }
    
    .server-status.not-running {
      color: #888888;
    }
    
    .server-status.game-over {
      color: #ff9800;
    }
    
    
    .game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%; /* Fill available height */
    }
    
    .chat-panel {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
    }
    
    .token-panel {
      margin-top: 15px;
    }
    
    .log {
      flex: 1;
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }
    
    .chat-log {
      flex: 0 0 auto; /* Don't grow, use fixed height */
      height: 80px; /* Reduced from 150px to 80px to save space */
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      overflow-y: auto;
      font-size: 7px; /* Reduced by half: was 14px, now 7px */
      margin-bottom: 10px;
    }
    
    /* Ensure all chat content uses the smaller font */
    .chat-log * {
      font-size: inherit !important;
    }
    
    .chat-input {
      display: flex;
      gap: 10px;
    }
    
    input, button {
      background-color: #3d3d3d;
      border: none;
      border-radius: 3px;
      padding: 8px 12px; /* Default padding for inputs and general buttons */
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
    }
    
    /* Override for left panel buttons to be smaller */
    .left-panel button {
      padding: 2px 4px; /* Minimal padding for left panel buttons */
    }
    
    input {
      flex: 1;
    }
    
    button {
      background-color: #2196f3;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #1976d2;
    }
    
    button:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    
    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 4px; /* Reduced from 10px to 4px for tighter spacing */
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }
    
    .ping-display {
      color: #4caf50;
    }
    
    .player-list {
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    
    .game-state {
      flex: 1;
      overflow-y: visible; /* Changed from auto to visible for non-scrollable */
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
      font-size: 9px; /* Reduced from 10.5px to 9px */
    }
    
    /* Override inline styles in game-state content */
    .game-state div {
      font-size: inherit !important;
    }
    
    .game-state strong {
      font-size: inherit !important;
    }
    
    .game-state span {
      font-size: inherit !important;
    }
    
    
    .verification-info {
      background-color: #252525;
      border-radius: 3px;
      padding: 10px;
    }
    
    .server-name {
      font-weight: bold;
      color: #4fc3f7;
      font-size: 12px; /* Larger than server-info (9px) */
    }
    
    .server-info {
      font-size: 9px; /* Reduced to 75% of 12px = 9px */
      color: #aaa;
    }
    
    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
    }
    
    .status-connected {
      background-color: #4caf50;
    }
    
    .status-disconnected {
      background-color: #f44336;
    }
    
    /* ANSI color simulation */
    .ansi-green {
      color: #4caf50;
    }
    
    .ansi-red {
      color: #f44336;
    }
    
    .ansi-yellow {
      color: #ffeb3b;
    }
    
    .ansi-blue {
      color: #2196f3;
    }
    
    .ansi-cyan {
      color: #00bcd4;
    }
    
    .ansi-magenta {
      color: #e91e63;
    }
    
    .ansi-white {
      color: #ffffff;
    }
    
    .ansi-gray {
      color: #9e9e9e;
    }
    
    .chat-message {
      margin-bottom: 5px;
    }
    
    .chat-timestamp {
      color: #9e9e9e;
      font-size: 6px; /* Reduced by half: was 12px, now 6px */
      margin-right: 5px;
    }
    
    .chat-sender {
      font-weight: bold;
      margin-right: 5px;
    }
    
    .chat-sender-server {
      color: #ffeb3b;
    }
    
    .chat-sender-self {
      color: #4fc3f7;
    }
    
    .chat-text {
      word-break: break-word;
    }

    /* Game iframe styles */
    .game-container {
      width: 100%;
      flex: 1; /* Take all available space */
      min-height: 650px; /* Minimum height */
      height: calc(100vh - 100px); /* Adjusted viewport height calculation */
      margin-bottom: 5px; /* Reduced margin */
      position: relative;
      border-radius: 5px;
      overflow: hidden;
      display: flex; /* Enable flex layout */
      flex-direction: column; /* Stack children vertically */
    }
    
    /* Add keyboard focus indicator as a separate element for better browser compatibility */
    .keyboard-indicator {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 14px;
      pointer-events: none; /* Allow clicks to pass through */
      opacity: 0.8;
      transition: opacity 0.3s;
      z-index: 5;
    }
    
    /* Hide the indicator when the game has focus - will be managed by JavaScript */
    .keyboard-indicator.hidden {
      opacity: 0;
    }
    
    .game-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #000;
      flex: 1; /* Take up all available space in the container */
      object-fit: contain; /* Maintain aspect ratio while filling space */
    }
    
    .game-iframe:focus {
      outline: 4px solid #4caf50 !important; /* Thicker outline for better visibility */
      box-shadow: 0 0 15px rgba(76, 175, 80, 0.6); /* Add glow effect when focused */
    }
    
    /* Fix for Firefox and some browsers to ensure iframe gets keyboard focus */
    .game-iframe.active-iframe {
      z-index: 10;
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.7) inset; /* Interior glow effect */
    }
    
    /* We'll handle this via JavaScript instead of CSS :has which isn't supported in all browsers */

    /* Tabs for game view and client panel */
    .tabs {
      display: flex;
      margin-bottom: 10px;
    }

    .tab {
      padding: 8px 16px;
      background-color: #3d3d3d;
      border-radius: 3px 3px 0 0;
      cursor: pointer;
      margin-right: 5px;
    }

    .tab.active {
      background-color: #2196f3;
    }

    .tab-content {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .tab-content.active {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="player-info" id="player-info">
        <button id="clear-identity-button" class="clear-button">Clear</button>
        <input type="text" id="player-name-input" class="player-name-input" placeholder="Enter your player name..." maxlength="16">
        <span class="player-address" id="player-address">Generating address...
          <span class="copy-hint" id="address-copy-hint">Copied to clipboard</span>
        </span>
        <span class="player-balance" id="player-balance">Balance: 0</span>
      </div>
    </div>
    
    <div class="main-content">
      <div class="left-panel panel">
        <div class="status-row">
          <div>
            <span class="status-indicator" id="connection-status"></span>
            <span id="connection-text">Disconnected</span>
          </div>
          <div class="ping-display" id="ping-display"></div>
        </div>
        
        <h2>Game Servers</h2>
        <div id="servers-container" class="server-list"></div>
        
        <div class="button-row">
          <button id="refresh-button">Refresh Servers</button>
          <button id="connect-button" disabled>Connect</button>
          <button id="disconnect-button" disabled>Disconnect</button>
        </div>
        
        <div class="button-row">
          <button id="create-server-button" style="background-color: #ffeb3b; color: #000; font-weight: bold; width: 100%;">Create New Server</button>
        </div>
        
        
        <!-- Direct connection button removed for security -->
        <!--
        <div class="button-row" style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #444;">
          <button id="direct-connect-button" style="background-color: #4caf50; width: 100%;">Connect to Dedicated Server via Original Web Server</button>
        </div>
        -->
        
        <h2>Game State</h2>
        <div class="game-state" id="game-state">No game state available</div>
        
        <h2>Chat</h2>
        <div class="chat-log" id="chat-log"></div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Type your message..." disabled>
          <button id="send-button" disabled>Send</button>
        </div>
      </div>
      
      <div class="resizer" id="resizer"></div>
      
      <div class="right-panels">
        <div class="game-container">
          <iframe id="game-iframe" class="game-iframe" tabindex="0" title="Click to enable keyboard controls" allow="autoplay; fullscreen; gamepad; keyboard-map" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>

  <!-- Load scripts -->
  <script src="lib/client/uniquake-token-service.js"></script>
  <script src="lib/client/browser-mock-game.js"></script>
  <script src="lib/client/browser-mock-client.js"></script>
  <script src="lib/client/game-integration.js"></script>
  
  <script>
    // Load WebRTC adapter directly, bypassing the auto-connect behavior
    window.UNIQUAKE_CONFIG = {
      useWebRTC: false,  // Disable WebRTC, use plain WebSockets
      masterServer: 'ws://localhost:27950', // Original Quake master server
      serverAddress: 'ws://localhost:27960',  // Explicitly use WebSocket protocol
      noAutoConnect: true  // Flag to prevent auto-connection
    };
    
    // Load the adapter script
    var script = document.createElement('script');
    script.src = '/webrtc-adapter.js';
    script.onload = function() {
      initializeClient();
    };
    document.head.appendChild(script);
    
    // Main client, game, and integration instances
    let client, game, integration;
    let selectedServerId = null;
    let currentPlayerName = null;
    
    // Get player name from localStorage or generate default
    function getPlayerName() {
      const savedName = localStorage.getItem('uniquake_player_name');
      if (savedName && savedName.trim()) {
        return savedName.trim();
      }
      return 'Player_' + Math.floor(Math.random() * 1000);
    }
    
    // Save player name to localStorage
    function savePlayerName(name) {
      if (name && name.trim()) {
        const cleanName = name.trim().substring(0, 16); // Limit to 16 chars
        localStorage.setItem('uniquake_player_name', cleanName);
        currentPlayerName = cleanName;
        return cleanName;
      }
      return null;
    }
    
    // Save player identity to localStorage (pubkey, secret, tokens)
    function savePlayerIdentity() {
      if (!client || !client.clientState.tokenService) {
        console.warn('Cannot save identity: token service not initialized');
        return false;
      }
      
      try {
        const identity = client.clientState.tokenService.getIdentity();
        const tokenStatus = client.clientState.tokenService.getTokenStatus();
        
        // Use current player name instead of token service username to ensure consistency
        const currentName = currentPlayerName || client.clientInfo.name || identity.username;
        
        // Save identity data
        const identityData = {
          username: currentName,
          pubkey: identity.pubkey,
          secret: client.clientState.tokenService.secret, // Save secret for full recovery
          tokens: tokenStatus.tokens,
          savedAt: Date.now()
        };
        
        localStorage.setItem('uniquake_player_identity', JSON.stringify(identityData));
        return true;
      } catch (error) {
        console.error('Failed to save player identity:', error);
        return false;
      }
    }
    
    // Load player identity from localStorage
    function loadPlayerIdentity() {
      try {
        const savedData = localStorage.getItem('uniquake_player_identity');
        if (!savedData) {
          return null;
        }
        
        const identityData = JSON.parse(savedData);
        
        return identityData;
      } catch (error) {
        console.error('Failed to load player identity:', error);
        return null;
      }
    }
    
    // Clear all player data from localStorage
    function clearPlayerData() {
      try {
        localStorage.removeItem('uniquake_player_name');
        localStorage.removeItem('uniquake_player_identity');
        return true;
      } catch (error) {
        console.error('Failed to clear player data:', error);
        return false;
      }
    }
    
    // Initialize client
    async function initializeClient() {
      // Load player name from storage or generate default
      currentPlayerName = getPlayerName();
      
      // Update UI with current player name
      const playerNameInput = document.getElementById('player-name-input');
      if (playerNameInput) {
        playerNameInput.value = currentPlayerName;
      }
      
      // Create mock game
      game = new BrowserMockGame({
        updateInterval: 2000,
        onStateChange: updateGameState
      });
      
      // Use the current player name
      const playerName = currentPlayerName;
      
      // Create mock client
      client = new BrowserMockClient({
        masterServer: window.UNIQUAKE_CONFIG.masterServer || 'ws://localhost:27950',
        name: playerName,
        verbose: true,
        debug: true,
        mintTokens: 5, // Will be overridden if we have saved tokens
        onStatusUpdate: updateClientStatus,
        onChatMessage: displayChatMessage,
        onConnectionChange: handleConnectionChange,
        onServerList: updateServerList,
        // Add handler for the new serverStateUpdate event
        onServerStateUpdate: function(serverInfo) {
          // Call updateGameState to refresh the UI with the latest server info
          if (game) {
            updateGameState(game.getGameState());
          }
        }
      });
      
      // Create game integration
      integration = new GameIntegration({
        client: client,
        debug: true,
        onGameStateUpdate: updateGameState,
        onTokenEvent: handleTokenEvent
      });
      
      // Initialize all components
      await game.init();
      
      // Try to restore saved identity before initializing client
      const savedIdentity = loadPlayerIdentity();
      if (savedIdentity) {
        // Modify client's token service config to use saved identity
        client.config.restoreIdentity = savedIdentity;
      }
      
      await client.init();
      await integration.init(game);
      
      // Store reference to game integration for syncing
      client.gameIntegration = integration;
      
      
      // Set up UI event handlers
      setupUIHandlers();
      
      // Initialize resizer functionality
      initializeResizer();
      
      // Set up auto-save on page unload
      setupPageUnloadAutoSave();
      
      // Connect to master server and fetch server list
      client.connectToMasterServer().then(() => {
        // Automatically request the server list
        client.requestServerList();
        
        // Set up periodic server list refresh every 5 seconds
        setInterval(() => {
          if (client && client.requestServerList) {
            client.requestServerList();
          }
        }, 5000);
      });
      
      // Update initial token info
      updateTokenInfo();
      
      // Save initial identity to localStorage
      setTimeout(() => {
        savePlayerIdentity();
      }, 1000); // Allow token service to fully initialize
      
      // Set up periodic identity saving (every 30 seconds)
      setInterval(() => {
        if (client && client.clientState.tokenService) {
          savePlayerIdentity();
        }
      }, 30000);
      
      // Set up automatic game state verification every 2 seconds when connected
      // This ensures the frame counter is updated frequently
      setInterval(() => {
        if (client.clientState.connected) {
          // Request verification from server
          client.sendMessage({
            type: 'request:game:state:token'
          });
          
          // Only log in debug mode to avoid console spam
          if (client.config.debug) {
          }
        }
      }, 2000);
    }
    
    // Set up auto-save functionality for page unload events
    function setupPageUnloadAutoSave() {
      // Save player name and identity before page is unloaded
      function saveOnUnload() {
        const playerNameInput = document.getElementById('player-name-input');
        
        // Save player name if it has been changed
        if (playerNameInput && playerNameInput.value.trim()) {
          const newName = playerNameInput.value.trim();

    // Connect Quake to the selected server
    function connectQuakeToServer(serverId) {
      const iframe = document.getElementById('game-iframe');
      if (!iframe) {
        console.error('Game iframe not found, cannot connect to server');
        return;
      }
      
      // Find the server info from the selected server
      const serverContainer = document.getElementById('servers-container');
      if (!serverContainer) {
        console.error('Server container not found');
        return;
      }
      
      const serverItems = serverContainer.querySelectorAll('.server-item');
      let serverInfo = null;
      let serverAddress = null;
      
      // First, try to get the server info and address from the UI
      for (let i = 0; i < serverItems.length; i++) {
        if (serverItems[i].getAttribute('data-server-id') === serverId) {
          const serverNameElem = serverItems[i].querySelector('.server-name');
          const serverName = serverNameElem ? serverNameElem.textContent : 'Unknown Server';
          
          const serverInfoElem = serverItems[i].querySelector('.server-info');
          const mapInfo = serverInfoElem ? serverInfoElem.textContent : '';
          const mapMatch = mapInfo.match(/Map:\s+([^\s|]+)/);
          const map = mapMatch ? mapMatch[1] : 'q3dm1';
          
          // Extract the server address from the displayed server info
          const addressInfos = serverItems[i].querySelectorAll('.server-info');
          for (let j = 0; j < addressInfos.length; j++) {
            const addressMatch = addressInfos[j].textContent.match(/Address:\s+(.+)/);
            if (addressMatch && addressMatch[1] && addressMatch[1].trim() !== 'Not specified') {
              serverAddress = addressMatch[1].trim();
              break;
            }
          }
          
          serverInfo = {
            name: serverName,
            map: map,
            address: serverAddress
          };
          
          break;
        }
      }
      
      // If address is not found in UI, try to get it from the client state
      if (!serverAddress && client && client.clientState && client.clientState.serverList) {
        const serverFromList = client.clientState.serverList.find(s => s.peerId === serverId);
        if (serverFromList && serverFromList.address) {
          serverAddress = serverFromList.address;
        }
      }
      
      // Check for malformed server metadata
      if (!serverAddress || serverAddress === 'Not' || serverAddress === 'Not specified') {
        console.error(`❌ MALFORMED SERVER METADATA: Server ${serverId} has invalid address: "${serverAddress}"`);
        console.error('This server cannot be connected to due to missing or malformed address information.');
        
        // Show error to user
        alert(`Cannot connect to server: Invalid server address ("${serverAddress || 'undefined'}").\n\nThis server has malformed metadata and cannot be connected to.`);
        
        // Mark this server as malformed in the UI
        const serverItem = document.querySelector(`[data-server-id="${serverId}"]`);
        if (serverItem) {
          serverItem.classList.add('malformed');
          const serverName = serverItem.querySelector('.server-name');
          if (serverName) {
            serverName.textContent += ' (MALFORMED)';
          }
        }
        
        // Disable connect button
        const connectButton = document.getElementById('connect-button');
        if (connectButton) {
          connectButton.disabled = true;
        }
        
        return; // Exit early, don't attempt connection
      }
      
      // Use the direct quake URL to connect to the dedicated server with the correct address
      // Also pass the player name to QuakeJS using the working +name format
      
      // Get the most current player name from multiple sources
      let playerName = null;
      
      // 1. Try to get from input field (most current)
      const playerNameInput = document.getElementById('player-name-input');
      if (playerNameInput && playerNameInput.value.trim()) {
        playerName = playerNameInput.value.trim();
      }
      
      // 2. Fall back to currentPlayerName global
      if (!playerName && currentPlayerName) {
        playerName = currentPlayerName;
      }
      
      // 3. Fall back to client info
      if (!playerName && client && client.clientInfo && client.clientInfo.name) {
        playerName = client.clientInfo.name;
      }
      
      // 4. Fall back to token service identity
      if (!playerName && client && client.clientState.tokenService) {
        const identity = client.clientState.tokenService.getIdentity();
        if (identity && identity.username) {
          playerName = identity.username;
        }
      }
      
      // 5. Final fallback
      if (!playerName) {
        playerName = 'UnnamedPlayer';
      }
      
      // Clean player name (remove special characters that might cause issues)
      const cleanPlayerName = playerName.replace(/[^\w\-\.]/g, '_');
      
      // Use the working URL format: +name PLAYERNAME +connect SERVERADDRESS
      const cmdline = `+name ${cleanPlayerName} +connect ${serverAddress}`;
      const encodedCmdline = encodeURIComponent(cmdline);
      let quakeClientUrl = `/quake?cmdline=${encodedCmdline}`;
      
      
      // We're using a relative URL which should connect directly to the server
      
      // Set up a load handler before changing the src
      iframe.onload = function() {
        console.log("Game iframe loaded, setting focus after a short delay");
        
        // Wait a moment for the game to fully initialize before focusing
        setTimeout(function() {
          if (iframe) {
            iframe.focus();
            
            // Also try to focus the content window
            if (iframe.contentWindow) {
              try {
                iframe.contentWindow.focus();
              } catch (e) {
                console.log("Could not focus content window on load:", e);
              }
            }
            
          }
        }, 1000);
        
        // Re-add server ID overlay after game loads
        setTimeout(function() {
          addServerIdOverlay(serverId);
        }, 1500);
      };
      
      // Set the iframe source
      iframe.src = quakeClientUrl;
      
      // Add initial server ID overlay
      addServerIdOverlay(serverId);
    }

    // Copy address to clipboard
    function copyAddressToClipboard() {
      const playerAddress = document.getElementById('player-address');
      const copyHint = document.getElementById('address-copy-hint');
      const fullAddress = playerAddress.getAttribute('data-full-address');
      
      if (!fullAddress) {
        return;
      }
      
      // Function to show copy hint
      function showCopyHint() {
        copyHint.classList.add('show');
        setTimeout(() => {
          copyHint.classList.remove('show');
        }, 2000);
      }
      
      // Try modern clipboard API first (requires HTTPS)
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(fullAddress).then(() => {
          console.log('Address copied to clipboard (modern API):', fullAddress);
          showCopyHint();
        }).catch((err) => {
          console.error('Modern clipboard API failed:', err);
          // Fall back to legacy method
          copyWithFallback();
        });
      } else {
        // Use fallback method directly
        copyWithFallback();
      }
      
      function copyWithFallback() {
        try {
          const textArea = document.createElement('textarea');
          textArea.value = fullAddress;
          textArea.style.position = 'fixed';
          textArea.style.left = '-999999px';
          textArea.style.top = '-999999px';
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          
          const successful = document.execCommand('copy');
          document.body.removeChild(textArea);
          
          if (successful) {
            console.log('Address copied to clipboard (fallback):', fullAddress);
            showCopyHint();
          } else {
            console.error('Fallback copy method failed');
          }
        } catch (fallbackErr) {
          console.error('Fallback copy method error:', fallbackErr);
        }
      }
    }

      if (client && client.clientState.connected) {

      }
      
      const confirmClear = confirm('Are you sure you want to clear your player identity? This will reset your name, generate a new cryptographic identity, and remove all saved tokens.');

      // Clear all player data from localStorage

      if (client && client.clientState.tokenService) {

        client.clientState.tokenService = null;

        delete client.config.restoreIdentity;

    // Generate autogenerated address based on pubkey
    function generatePlayerAddress(pubkey) {
      if (!pubkey) return 'No address';
      
      // Create a simple address format: first 8 chars + last 8 chars of pubkey
      const addressPrefix = pubkey.substring(0, 8);
      const addressSuffix = pubkey.substring(pubkey.length - 8);
      return `${addressPrefix}...${addressSuffix}`;
    }
    
    // Update server list
    function updateServerList(servers) {
      const container = document.getElementById('servers-container');
      container.innerHTML = '';
      
      if (servers.length === 0) {
        container.innerHTML = '<div class="server-item">No servers available</div>';
        return;
      }
      
      servers.forEach(server => {
        const serverElem = document.createElement('div');
        serverElem.className = 'server-item';
        serverElem.setAttribute('data-server-id', server.peerId);
        
        if (selectedServerId === server.peerId) {
          serverElem.classList.add('selected');
        }
        
        // Check for malformed server metadata
        const isMalformed = !server.address || server.address === 'Not specified' || server.address.includes('Not');
        if (isMalformed) {
          serverElem.classList.add('malformed');
          console.warn(`⚠️ MALFORMED SERVER: ${server.name} (${server.peerId}) has invalid address: "${server.address}"`);
        }
        
        // Check dedicated server state and apply appropriate styling
        const dedicatedState = server.dedicatedServerState || 'not_running';
        const stateClass = dedicatedState.replace(/_/g, '-'); // Convert 'not_running' to 'not-running'
        serverElem.classList.add(stateClass);
        
        const serverName = isMalformed ? `${server.name} (MALFORMED)` : server.name;
        const stateText = dedicatedState === 'not_running' ? 'Not Running' : 
                         dedicatedState === 'starting' ? 'Starting' :
                         dedicatedState === 'game_over' ? 'Game Over' : 'Running';
        
        serverElem.innerHTML = `
          <div class="server-name">${serverName}</div>
          <div class="server-info">Map: ${server.map} | Players: ${server.players}/${server.maxPlayers}</div>
          <div class="server-status ${stateClass}">Status: ${stateText}</div>
          <div class="server-info">ID: ${server.peerId}</div>
          <div class="server-info" style="display:none;">Address: ${server.address || 'Not specified'}</div>
        `;
        
        serverElem.addEventListener('click', () => {
          // Deselect previous selection
          document.querySelectorAll('.server-item.selected').forEach(item => {
            item.classList.remove('selected');
          });
          
          // Select this server
          serverElem.classList.add('selected');
          selectedServerId = server.peerId;
          
          // Disable connect button if server is malformed, not running, or client is already connected
          const connectButton = document.getElementById('connect-button');
          if (connectButton) {
            const canConnect = !client.clientState.connected && !isMalformed && dedicatedState === 'running';
            connectButton.disabled = !canConnect;
            
            if (isMalformed) {
              connectButton.title = 'Cannot connect: Server has malformed metadata';
            } else if (dedicatedState === 'not_running') {
              connectButton.title = 'Cannot connect: Dedicated server is not running';
            } else if (dedicatedState === 'starting') {
              connectButton.title = 'Cannot connect: Dedicated server is still starting';
            } else if (dedicatedState === 'game_over') {
              connectButton.title = 'Cannot connect: Game is over, waiting for restart';
            } else {
              connectButton.title = '';
            }
          }
        });
        
        container.appendChild(serverElem);
      });
    }
    
    // Handle connection changes
    function handleConnectionChange(status) {
      const connectButton = document.getElementById('connect-button');
      const disconnectButton = document.getElementById('disconnect-button');
      const chatInput = document.getElementById('chat-input');
      const sendButton = document.getElementById('send-button');
      const connectionStatus = document.getElementById('connection-status');
      const connectionText = document.getElementById('connection-text');
      const playerNameInput = document.getElementById('player-name-input');
      const clearButton = document.getElementById('clear-identity-button');
      
      if (status.connected) {
        connectButton.disabled = true;
        disconnectButton.disabled = false;
        chatInput.disabled = false;
        sendButton.disabled = false;
        playerNameInput.disabled = true; // Disable name editing while connected
        clearButton.disabled = true; // Disable clear while connected
        connectionStatus.className = 'status-indicator status-connected';
        connectionText.textContent = 'Connected';
        
        // Start the game
        game.start();
        
        // Connect Quake to the server ONLY after our framework client connects to a server
        console.log('Framework client connected successfully, connecting Quake client to server');
        if (selectedServerId) {
          connectQuakeToServer(selectedServerId);
        }
      } else {
        connectButton.disabled = false;
        disconnectButton.disabled = true;
        chatInput.disabled = true;
        sendButton.disabled = true;
        playerNameInput.disabled = false; // Re-enable name editing when disconnected
        clearButton.disabled = false; // Re-enable clear when disconnected
        connectionStatus.className = 'status-indicator status-disconnected';
        connectionText.textContent = 'Disconnected';
        document.getElementById('ping-display').textContent = '';
        
        // Stop the game
        game.stop();
        
        // Reset the Quake iframe
        document.getElementById('game-iframe').src = '';
      }
    }
    
    // Update client status
    function updateClientStatus(status) {
      // Update ping display if available
      if (status.ping && status.ping.last) {
        document.getElementById('ping-display').textContent = `Ping: ${status.ping.last}ms`;
      }
      
      // Update token info if available
      if (status.tokens) {
        updateTokenInfo(status.tokens);
      }
      
    }
    
    // Update game state display
    function updateGameState(gameState) {
      if (!gameState) return;
      
      // Calculate state hash for local state if token service is available
      let localStateHash = 'N/A';
      if (client && client.clientState.tokenService && client.clientState.tokenService.hashGameState) {
        try {
          // Enable debug mode temporarily to see serialization and hash details
          const debugEnabled = client.clientState.tokenService.debugMode;
          client.clientState.tokenService.debugMode = true;
          
          // Use the token service's normalization and hash calculation
          // This ensures we use exactly the same process as the server
          localStateHash = client.clientState.tokenService.hashGameState(gameState);
          console.log(`Calculated local hash for frame ${gameState.frame}:`, localStateHash);
          
          // Restore previous debug setting
          client.clientState.tokenService.debugMode = debugEnabled;
        } catch (error) {
          console.error('Failed to calculate game state hash:', error.message);
        }
      }
      
      // Get server hash from verification if available
      const serverHash = gameState.serverHash || 
                         client?.clientState?.lastGameStateVerification?.stateHash || 
                         'Not verified';
      
      // Determine verification status
      let verificationStatus;
      let statusColor;
      let statusBgColor;
      let statusText;
      let statusIcon;
      
      if (serverHash === 'Not verified') {
        // Server hash not available yet - show in progress
        verificationStatus = 'in_progress';
        statusColor = '#ffeb3b'; // Yellow
        statusBgColor = 'rgba(255, 235, 59, 0.1)';
        statusText = '⏳ IN PROGRESS';
        statusIcon = 'ansi-yellow';
      } else if (localStateHash !== 'N/A' && localStateHash === serverHash) {
        // Hashes match - verified
        verificationStatus = 'verified';
        statusColor = '#4caf50'; // Green
        statusBgColor = 'rgba(76, 175, 80, 0.1)';
        statusText = '✓ VERIFIED';
        statusIcon = 'ansi-green';
      } else {
        // Hashes don't match - failed
        verificationStatus = 'failed';
        statusColor = '#f44336'; // Red
        statusBgColor = 'rgba(244, 67, 54, 0.1)';
        statusText = '✗ VERIFICATION FAILED';
        statusIcon = 'ansi-red';
      }
      
      // Update server ID overlay with verification status
      if (selectedServerId) {
        addServerIdOverlay(selectedServerId, verificationStatus);
      }
      
      // For backwards compatibility
      const hashesMatch = verificationStatus === 'verified';
      
      // Get verified frame number from token verification if available
      const verifiedFrame = client?.clientState?.lastGameStateVerification?.frame || gameState.frame;
      const serverFrame = client?.clientState?.lastGameStateVerification?.serverFrame || verifiedFrame;
      
      // IMPORTANT: Get server info prioritizing the dedicated server state info message
      console.log("[SERVER_STATE] Looking for server state info sources");
      
      let serverInfo;
      // First priority: Use dedicated server state info from client state (from server:state:update message)
      if (client?.clientState?.serverStateInfo) {
        serverInfo = client.clientState.serverStateInfo;
        console.log("[SERVER_STATE] Using dedicated server state info:", JSON.stringify(serverInfo));
      }
      // Second priority: Use server info from verification object
      else if (client?.clientState?.lastGameStateVerification?.serverInfo) {
        serverInfo = client.clientState.lastGameStateVerification.serverInfo;
        console.log("[SERVER_STATE] Using server info from verification:", JSON.stringify(serverInfo));
      }
      // Fallback: Use client-side data
      else {
        serverInfo = {
          playerCount: Object.keys(gameState.players).length,
          itemCount: Object.keys(gameState.items || {}).length,
          timestamp: gameState.timestamp
        };
        console.log("[SERVER_STATE] Using fallback client-side server info:", JSON.stringify(serverInfo));
      }
      
      // Check if serverInfo has all required fields and enforce them
      if (!serverInfo.playerCount && serverInfo.playerCount !== 0) {
        console.log("[SERVER_STATE] playerCount missing, setting to 0");
        serverInfo.playerCount = 0;
      }
      
      if (!serverInfo.itemCount && serverInfo.itemCount !== 0) {
        console.log("[SERVER_STATE] itemCount missing, setting to 0");
        serverInfo.itemCount = 0;
      }
      
      if (!serverInfo.timestamp) {
        console.log("[SERVER_STATE] timestamp missing, setting to current time");
        serverInfo.timestamp = Date.now();
      }
      
      // Format server timestamp with error handling
      let serverTime = 'Unknown';
      try {
        // Make sure timestamp is valid
        if (serverInfo && serverInfo.timestamp) {
          const timestamp = new Date(serverInfo.timestamp);
          // Check if date is valid
          if (!isNaN(timestamp.getTime())) {
            serverTime = timestamp.toLocaleTimeString();
          } else {
            console.warn('Invalid server timestamp:', serverInfo.timestamp);
          }
        }
      } catch (error) {
        console.error('Error formatting server timestamp:', error);
      }
      
      // Recalculate the local hash using the EXACT same normalization as the token service
      if (client && client.clientState.tokenService) {
        // Ensure we're using the exactly same state normalization as the server
        const normalizedState = client.clientState.tokenService.normalizeGameState(gameState);
        localStateHash = client.clientState.tokenService.hashGameState(normalizedState);
        console.log(`Recalculated hash using normalized state with only frame and gameId:`, localStateHash);
      }
      
      // Update game state display
      const gameStateElem = document.getElementById('game-state');
      gameStateElem.innerHTML = `
        <div style="font-size: 18px; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px;">
          <strong>Frame:</strong> <span class="ansi-blue" style="font-weight: bold;">${verifiedFrame}</span>
          <span style="font-size: 12px; color: #aaa; margin-left: 10px;">Verified with server</span>
        </div>
        
        <!-- Enhanced Server State Section -->
        <div style="margin-bottom: 8px; background-color: #2a2a2a; border-radius: 3px; padding: 6px; border-left: 2px solid #00bcd4;">
          <div style="font-size: inherit; font-weight: normal; margin-bottom: 4px; color: #00bcd4; display: flex; justify-content: space-between; align-items: center;">
            <span>SERVER STATE</span>
            <span style="font-size: inherit; background-color: #333; padding: 1px 3px; border-radius: 5px;">Direct from server</span>
          </div>
          <div style="display: grid; grid-template-columns: auto 1fr; gap: 4px; align-items: center; line-height: 1.2;">
            <div>Connected Players:</div>
            <div style="color: #4fc3f7;">${serverInfo.playerCount}</div>
            
            <div>Server Timestamp:</div>
            <div style="color: #4fc3f7;">${serverTime}</div>
            
            <div>Last Update:</div>
            <div style="color: #4fc3f7;">${(() => {
              try {
                if (serverInfo && serverInfo.timestamp && !isNaN(serverInfo.timestamp)) {
                  const secondsAgo = Math.round((Date.now() - serverInfo.timestamp) / 1000);
                  if (secondsAgo >= 0) {
                    return `${secondsAgo} seconds ago`;
                  } else {
                    return 'Just now';
                  }
                }
                return 'Unknown';
              } catch (e) {
                console.error('Error calculating time since update:', e);
                return 'Unknown';
              }
            })()}</div>
          </div>
        </div>
        
        <!-- Verification Status Section -->
        <div style="border: 1px solid ${statusColor}; padding: 10px; border-radius: 4px; margin: 10px 0; background-color: ${statusBgColor};">
          <div style="display: flex; align-items: center; margin-bottom: 5px;">
            <strong style="margin-right: 10px;">Verification Status:</strong> 
            <span class="${statusIcon}" style="font-weight: bold; font-size: 16px;">
              ${statusText}
            </span>
          </div>
          <div style="display: grid; grid-template-columns: auto 1fr; gap: 5px; font-family: monospace; font-size: 12px;">
            <div><strong>Server Hash:</strong></div>
            <div style="word-break: break-all; color: #ffeb3b;">
              ${typeof serverHash === 'string' && serverHash.length > 20 ? serverHash.substring(0, 20) + '...' : serverHash}
            </div>
            
            <div><strong>Local Hash:</strong></div>
            <div style="word-break: break-all; color: #4fc3f7;">
              ${localStateHash.substring(0, 20)}...
            </div>
          </div>
        </div>
      `;
      
      if (gameState.ended) {
        gameStateElem.innerHTML += `
          <strong>Game Ended</strong><br>
          <strong>Winner:</strong> ${gameState.winner ? gameState.players[gameState.winner]?.name || gameState.winner : 'None'}<br>
        `;
      }
      
      // Verification info is now handled by the game overlay and Game State panel
      // No need for separate verification info updates
    }
    
    // Display chat message
    function displayChatMessage(message) {
      const chatLog = document.getElementById('chat-log');
      const messageElem = document.createElement('div');
      messageElem.className = 'chat-message';
      
      const time = new Date(message.timestamp).toLocaleTimeString();
      let senderClass = '';
      
      if (message.from === 'SERVER') {
        senderClass = 'chat-sender-server';
      } else if (message.from === client.clientState.clientId) {
        senderClass = 'chat-sender-self';
      }
      
      messageElem.innerHTML = `
        <span class="chat-timestamp">[${time}]</span>
        <span class="chat-sender ${senderClass}">${message.from}:</span>
        <span class="chat-text">${message.message}</span>
      `;
      
      chatLog.appendChild(messageElem);
      chatLog.scrollTop = chatLog.scrollHeight;
    }
    
    // Update player information in header
    function updateTokenInfo(tokens) {
      const playerNameInput = document.getElementById('player-name-input');
      const playerAddress = document.getElementById('player-address');
      const playerBalance = document.getElementById('player-balance');
      
      if (!client || !client.clientState.tokenService) {
        if (playerNameInput) playerNameInput.placeholder = 'Enter your player name...';
        if (playerAddress) playerAddress.innerHTML = 'Generating address...<span class="copy-hint" id="address-copy-hint">Copied to clipboard</span>';
        if (playerBalance) playerBalance.textContent = 'Balance: 0';
        return;
      }
      
      const inventory = client.getTokenInventory();
      const identity = client.clientState.tokenService.getIdentity();
      
      // Update placeholder and value if input is empty
      if (playerNameInput) {
        if (!playerNameInput.value) {
          playerNameInput.value = identity.username;
        }
        playerNameInput.placeholder = identity.username;
      }
      
      // Generate and display player address
      const fullAddress = identity.pubkey; // Use full pubkey as address
      const displayAddress = generatePlayerAddress(identity.pubkey);
      if (playerAddress) {
        playerAddress.innerHTML = `${displayAddress}<span class="copy-hint" id="address-copy-hint">Copied to clipboard</span>`;
        playerAddress.setAttribute('data-full-address', fullAddress);
      }
      
      if (playerBalance) {
        playerBalance.textContent = `Balance: ${inventory.value || '0'}`;
      }
    }
    
    // Update verification information (deprecated - now handled by game overlay)
    function updateVerificationInfo(result) {
      // No longer needed since verification-info element was removed with Token System panel
      // Verification status is now shown in the game overlay and Game State panel
      return;
    }
    
    // Handle token events
    function handleTokenEvent(event) {
      console.log('Token event:', event);
      
      // Update token info
      updateTokenInfo();
      
      // Save identity when tokens are updated
      savePlayerIdentity();
      
      // If it's a verification event, update the game state display only
      if (event.type === 'game_state_verification') {
        // Update game state display to show current hash status
        if (client?.gameIntegration?.game) {
          updateGameState(client.gameIntegration.game.getGameState());
        }
        
        // Log verification result for debugging
        if (event.result.verified) {
          console.log(`Game state verified at frame ${event.frame}: Hash matches`);
        } else {
          console.warn(`Game state verification failed at frame ${event.frame}: ${event.result.error || 'Hash mismatch'}`);
        }
      }
    }
    
    // Validate and save player name (no popup messages)
    function validateAndSavePlayerName(newName) {
      if (!newName) {
        console.warn('Player name cannot be empty');
        return false;
      }
      
      // Validate name (basic validation)
      if (newName.length > 16) {
        console.warn('Player name must be 16 characters or less');
        return false;
      }
      
      if (!/^[a-zA-Z0-9_\-\.]+$/.test(newName)) {
        console.warn('Player name can only contain letters, numbers, underscore, dash, and dot');
        return false;
      }
      
      // Save the name
      const savedName = savePlayerName(newName);
      if (savedName) {
        console.log(`Player name saved: ${savedName}`);
        
        // Update the header display immediately
        updateTokenInfo();
        
        // Save updated identity to localStorage
        setTimeout(() => {
          savePlayerIdentity();
        }, 100);
        
        return true;
      }
      
      return false;
    }
    
    // Create new server function
    function createNewServer() {
      console.log('Opening new server window...');
      
      // Open the server page in a new window (use /server route for proper config)
      const serverWindow = window.open('/server', '_blank', 'width=800,height=600,scrollbars=yes,resizable=yes');
      
      if (serverWindow) {
        console.log('Server window opened successfully');
      } else {
        alert('Failed to open server window. Please check if pop-ups are blocked.');
      }
    }
    
    // Panel resizer functionality
    function initializeResizer() {
      const resizer = document.getElementById('resizer');
      const leftPanel = document.querySelector('.left-panel');
      const rightPanels = document.querySelector('.right-panels');
      
      console.log('Initializing resizer...', { resizer, leftPanel, rightPanels });
      
      if (!resizer || !leftPanel || !rightPanels) {
        console.warn('Resizer elements not found:', { 
          resizer: !!resizer, 
          leftPanel: !!leftPanel, 
          rightPanels: !!rightPanels 
        });
        return;
      }
      
      let isResizing = false;
      let startX = 0;
      let startWidth = 0;
      
      // Make sure the resizer is visible and has proper styling
      resizer.style.cursor = 'col-resize';
      resizer.style.userSelect = 'none';
      
      console.log('Resizer initialized successfully');
      
      resizer.addEventListener('mousedown', (e) => {
        console.log('Resizer mousedown event');
        isResizing = true;
        startX = e.clientX;
        startWidth = parseInt(document.defaultView.getComputedStyle(leftPanel).width, 10);
        
        console.log('Starting resize:', { startX, startWidth });
        
        // Prevent text selection during resize
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'col-resize';
        
        // Add event listeners to document for mouse move and up
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        
        e.preventDefault();
      });
      
      function handleMouseMove(e) {
        if (!isResizing) return;
        
        const currentX = e.clientX;
        const width = startWidth + (currentX - startX);
        const minWidth = parseInt(getComputedStyle(leftPanel).minWidth, 10) || 150;
        const maxWidth = parseInt(getComputedStyle(leftPanel).maxWidth, 10) || 600;
        
        // Constrain width within bounds
        const constrainedWidth = Math.min(Math.max(width, minWidth), maxWidth);
        
        // Apply the new width immediately
        leftPanel.style.width = constrainedWidth + 'px';
        
        // Optional: log during drag (comment out if too noisy)
        // console.log('Resizing to width:', constrainedWidth);
      }
      
      function handleMouseUp() {
        console.log('Resizer mouseup event');
        isResizing = false;
        
        // Restore normal cursor and text selection
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        
        // Remove event listeners
        document.removeEventListener('mousemove', handleMouseMove);
        document.removeEventListener('mouseup', handleMouseUp);
      }
      
      // Handle double-click to reset to default width
      resizer.addEventListener('dblclick', () => {
        console.log('Resizer double-click: resetting to 250px');
        leftPanel.style.width = '250px';
      });
      
      // Test that the resizer is working by adding a hover effect
      resizer.addEventListener('mouseenter', () => {
        resizer.style.backgroundColor = '#4fc3f7';
      });
      
      resizer.addEventListener('mouseleave', () => {
        if (!isResizing) {
          resizer.style.backgroundColor = '#444';
        }
      });
    }
    
    // Initialize resizer when page loads
    window.addEventListener('DOMContentLoaded', initializeResizer);
    
    // Also initialize after scripts load to ensure DOM is fully ready
    document.addEventListener('readystatechange', function() {
      if (document.readyState === 'complete') {
        // Add a small delay to ensure all elements are rendered
        setTimeout(initializeResizer, 100);
      }
    });
  </script>
</body>
